name: Publish

on:
  release:
    types:
      - published
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish-to-npm:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Check out publish ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/session-scanner -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify publish ref matches package version
        run: |
          node -e "const { version } = require('./package.json'); const expected = process.env.RELEASE_TAG.replace(/^v/, ''); if (version !== expected) { throw new Error(`Publish ref ${process.env.RELEASE_TAG} does not match package.json version ${version}`); }"

      - name: Decide publish mode
        run: |
          PACKAGE_VERSION="${RELEASE_TAG#v}"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

          if npm view "agentwarden@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo 'PACKAGE_ALREADY_PUBLISHED=1' >> "$GITHUB_ENV"
          else
            echo 'PACKAGE_ALREADY_PUBLISHED=0' >> "$GITHUB_ENV"
          fi

          if [ "${{ github.event.release.prerelease }}" = "true" ] || [[ "$PACKAGE_VERSION" == *-* ]]; then
            echo 'NPM_DIST_TAG=next' >> "$GITHUB_ENV"
          else
            echo 'NPM_DIST_TAG=latest' >> "$GITHUB_ENV"
          fi

      - name: Skip duplicate publish
        if: env.PACKAGE_ALREADY_PUBLISHED == '1'
        run: echo "agentwarden@$PACKAGE_VERSION is already published; skipping npm publish"

      - name: Run tests, build, and packaging checks
        if: env.PACKAGE_ALREADY_PUBLISHED != '1'
        run: bun run ci

      - name: Publish to npm
        if: env.PACKAGE_ALREADY_PUBLISHED != '1'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag "$NPM_DIST_TAG"
