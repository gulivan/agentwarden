name: Publish

on:
  release:
    types:
      - published

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish-to-npm:
    runs-on: macos-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/session-scanner -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node -e "const { version } = require('./package.json'); const expected = process.env.RELEASE_TAG.replace(/^v/, ''); if (version !== expected) { throw new Error(`Release tag ${process.env.RELEASE_TAG} does not match package.json version ${version}`); }"

      - name: Choose npm dist-tag
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo 'NPM_DIST_TAG=next' >> "$GITHUB_ENV"
          else
            echo 'NPM_DIST_TAG=latest' >> "$GITHUB_ENV"
          fi

      - name: Run tests, build, and packaging checks
        run: bun run ci

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag "$NPM_DIST_TAG"
